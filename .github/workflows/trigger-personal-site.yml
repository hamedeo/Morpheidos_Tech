name: Trigger combined website deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Verify deployment token
        shell: bash
        env:
          PUBLIC_SITE_DEPLOY_TOKEN: ${{ secrets.PUBLIC_SITE_DEPLOY_TOKEN }}
        run: |
          if [ -z "$PUBLIC_SITE_DEPLOY_TOKEN" ]; then
            echo "::error::The PUBLIC_SITE_DEPLOY_TOKEN repository secret is missing or empty."
            exit 1
          fi

      - name: Trigger public website deployment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PUBLIC_SITE_DEPLOY_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: "hamedeo",
              repo: "hamedeo.github.io",
              workflow_id: "deploy.yml",
              ref: "main"
            });

            core.info(
              "Successfully triggered deploy.yml in hamedeo/hamedeo.github.io."
            );
